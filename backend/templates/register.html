{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-screen bg-gradient-to-r from-green-400 to-blue-500">

<div class="bg-white/90 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-96">

    <!-- Title -->
    <h2 class="text-3xl font-bold text-center mb-2">Create Account 🚀</h2>
    <p class="text-center text-gray-500 mb-6">Join Deepfake AI today</p>

    <!-- Form -->
    <form method="POST">

        <!-- Username -->
        <div class="mb-4">
            <input name="username" placeholder="Username"
                   class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Email -->
        <div class="mb-4">
            <input name="email" type="email" placeholder="Email"
                   class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Password -->
        <div class="mb-4">
            <input name="password" type="password" placeholder="Password"
                   class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Button -->
        <button class="w-full bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg transition duration-300">
            Register
        </button>

    </form>

    <!-- Links -->
    <div class="text-center mt-4 text-sm">
        <p>
            Already have an account?
            <a href="/login" class="text-blue-500 hover:underline">
                Login
            </a>
        </p>
    </div>

</div>

</div>

{% endblock %}
