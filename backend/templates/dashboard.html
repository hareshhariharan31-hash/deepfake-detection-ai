{% extends "base.html" %}
{% block content %}

<h1 class="text-3xl font-bold mb-6">Welcome {{ username }} 👋</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Upload Card -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
        <h3 class="text-xl font-semibold">Upload Image</h3>
        <p class="text-gray-500">Check deepfake instantly</p>
        <a href="/upload" class="block mt-4 bg-blue-500 text-white p-2 rounded text-center">Go</a>
    </div>

    <!-- History Card -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
        <h3 class="text-xl font-semibold">History</h3>
        <p class="text-gray-500">View past results</p>
        <a href="/history" class="block mt-4 bg-green-500 text-white p-2 rounded text-center">View</a>
    </div>

    <!-- Stats -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
        <h3 class="text-xl font-semibold mb-3">Stats</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['FAKE', 'REAL'],
        datasets: [{
            data: [{{ fake_count }}, {{ real_count }}]
        }]
    }
});
</script>

{% endblock %}
