{% extends "base.html" %}

{% block content %}
<h1>Welcome {{ username }} 👋</h1>

<div class="card">
    <h3>Upload Deepfake</h3>
    <p>Check if an image is fake or real</p>
    <a href="/upload">Go to Upload</a>
</div>

<div class="card">
    <h3>View History</h3>
    <p>See your previous results</p>
    <a href="/history">View History</a>
</div>

<div class="card">
    <h3>Your Stats</h3>
    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const fake = parseInt("{{ fake_count | default(0) }}");
const real = parseInt("{{ real_count | default(0) }}");

const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['FAKE', 'REAL'],
        datasets: [{
            data: [fake, real]
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}
