{% extends "base.html" %}

{% block content %}
<h2>Your History</h2>

{% for row in data %}
<div class="card">
    <img src="/uploads/{{ row[0].split('\\')[-1] }}" width="150"> 
         width="150" 
         style="border-radius:10px;"><br><br>

    <p><b>Result:</b> {{ row[1] }}</p>
    <p><b>Confidence:</b> {{ row[2] }}</p>
    <p><b>Date:</b> {{ row[3] }}</p>
</div>
{% endfor %}

{% endblock %}
