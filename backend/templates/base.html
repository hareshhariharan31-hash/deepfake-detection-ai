<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff7a18;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #ffd;
            text-decoration: none;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    {% block content %}{% endblock %}
</body>
</html>
