{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input name="email" type="email" placeholder="Email"><br>
        <input name="password" type="password" placeholder="Password"><br>

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register">Register</a></p>
</div>
{% endblock %}
